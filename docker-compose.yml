version: '3.8'

services:

  mysql:
    image: mysql:8
    container_name: ewallet-db
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: Harsh@12345
      MYSQL_DATABASE: ewallet
    ports:
      - "3307:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: [ "CMD", "mysqladmin", "ping", "-h", "localhost" ]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    build: .
    container_name: ewallet-app
    restart: always
    ports:
      - "8082:8080"
    depends_on:
      mysql:
        condition: service_healthy
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/ewallet?allowPublicKeyRetrieval=true&useSSL=false
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: Harsh@12345

volumes:
  mysql_data: