spring.application.name=e-wallet-service-api

#configure database (mysql)
spring.datasource.url=jdbc:mysql://mysql:3306/ewallet?allowPublicKeyRetrieval=true&useSSL=false

# Database Username
#spring.datasource.username=root

# Database Password
#spring.datasource.password=Harsh@12345

# JDBC Driver
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

#Hibernate Configuration
# Automatically update tables
spring.jpa.hibernate.ddl-auto=update

# Show SQL in console
spring.jpa.show-sql=true

# Format SQL
spring.jpa.properties.hibernate.format_sql=true

# Spring prints mappings in console i
logging.level.org.springframework.web=DEBUG

#security config
#spring.security.user.name = harsh
#spring.security.user.password = pass

#JWT Secret key
jwt.secretKey=thisissecretkeyforfgkfkfhhftyejttdkffjkjhuiydghjwttokenjfddfjhfjksdfhhl
jwt.expiration=86400000

#Debug logs for Logging
logging.level.root=INFO
logging.level.com.example.courier.management=DEBUG

#Debug: This shows SQL queries + parameter values.
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.type.descriptor.sql=TRACE

#Colored console logs
spring.output.ansi.enabled=ALWAYS
